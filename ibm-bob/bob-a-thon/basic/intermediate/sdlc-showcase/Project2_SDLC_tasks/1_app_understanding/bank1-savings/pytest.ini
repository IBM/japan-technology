[pytest]
# Pytest configuration for Bank1-Savings tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test* *Tests *TestCase
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options
[coverage:run]
source = .
omit = 
    test_*.py
    *_test.py
    */tests/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov

